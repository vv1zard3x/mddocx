# mddocx-web routed via an existing Traefik instance running on the host.
#
# Assumes Traefik:
#   - is already running on this host with Docker provider enabled,
#   - exposes entrypoint `websecure` (HTTPS) and a cert resolver named `le`,
#   - is attached to the external Docker network `proxy`.
#
# Before first run:
#   1. Point an A-record from example.com to this host.
#   2. Replace `example.com` below.
#   3. Adjust `traefik.http.routers.mddocx.tls.certresolver=<name>` to match
#      the cert resolver name configured in your Traefik (default here: `le`).
#
#   docker compose up -d --build

services:
  mddocx:
    build: .
    image: mddocx-web:latest
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # Comma-separated list of Host header values accepted by the MCP
      # endpoint (DNS-rebinding protection). Use the same domain you set in
      # the Traefik Host(...) rule below. Leave unset to disable the check
      # (e.g. for local development).
      MDDOCX_ALLOWED_HOSTS: example.com
      MDDOCX_ALLOWED_ORIGINS: https://example.com
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.mddocx.rule=Host(`example.com`)
      - traefik.http.routers.mddocx.entrypoints=websecure
      - traefik.http.routers.mddocx.tls=true
      - traefik.http.routers.mddocx.tls.certresolver=le
      - traefik.http.services.mddocx.loadbalancer.server.port=8000

networks:
  proxy:
    external: true
